# ============================================================
# Site Settings
# ============================================================
title                    : "Fang Lin"
subtitle                 : "Quantitative Research · Data Science · Optimization"
name                     : "Fang Lin"
description              : >-
  Personal site of Fang Lin — Quantitative Research,
  Data Science, and Optimization.
url                      : "https://linnnfang.github.io"
baseurl                  : ""
repository               : "linnnFang/linnnFang.github.io"

# ============================================================
# Theme
# ============================================================
remote_theme             : "mmistakes/minimal-mistakes"
minimal_mistakes_skin    : "dark"

# ============================================================
# Site Author
# ============================================================
author:
  name     : "Fang Lin"
  avatar   : "/assets/images/bio-photo.JPG"
  bio      : "Quantitative Research · Data Science · Optimization"
  location : ""
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/linnnFang"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/YOUR_ID"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:your@email.com"

# ============================================================
# Footer
# ============================================================
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/linnnFang"

# ============================================================
# Build Settings
# ============================================================
markdown: kramdown
search: true
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: America/Chicago

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-remote-theme

# ============================================================
# MathJax
# ============================================================
head_scripts:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML

# ============================================================
# Kramdown
# ============================================================
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge

# ============================================================
# Collections
# ============================================================
collections:
  projects:
    output: true
    permalink: /projects/:path/
  notes:
    output: true
    permalink: /notes/:path/

# ============================================================
# Defaults
# ============================================================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      toc: true
      toc_sticky: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: false
      share: true
  - scope:
      path: ""
      type: notes
    values:
      layout: single
      author_profile: true
      toc: true
      toc_sticky: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
